services:
  - type: web
    name: decormimbre-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SIGNING_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: decormimbre-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://decormimbre.vercel.app

databases:
  - name: decormimbre-db
    databaseName: decormimbre
    user: decormimbre_user
    plan: free
